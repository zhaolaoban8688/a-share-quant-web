name: A股沪深主板双买点结构扫描 V4.1

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 扫描模式
        required: true
        type: choice
        default: close
        options:
          - intraday
          - close
      near_tolerance:
        description: 均线或结构支撑附近允许偏差（0.15=15%）
        required: true
        default: "0.15"
      max_stocks:
        description: 最大扫描数（0=沪深主板全部）
        required: true
        default: "0"

permissions:
  contents: write

concurrency:
  group: a-share-manual-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: 取出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装免费数据和计算依赖
        run: |
          python -m pip install --upgrade pip
          pip install "akshare>=1.18.0" "pandas>=2.1" "numpy>=1.26" "requests>=2.31"

      - name: 扫描沪深主板双买点结构
        run: |
          python scan.py \
            --mode "${{ inputs.mode }}" \
            --near-tolerance "${{ inputs.near_tolerance }}" \
            --max-stocks "${{ inputs.max_stocks }}" \
            --workers 28 \
            --bars 320 \
            --top 40

      - name: 保存最新结果到网页
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/candidates.csv
          if git diff --cached --quiet; then
            echo "结果没有变化，无需提交"
          else
            git commit -m "scan V4.1: ${{ inputs.mode }} $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: 上传结果备份
        uses: actions/upload-artifact@v4
        with:
          name: a-share-v41-candidates-${{ inputs.mode }}
          path: |
            data/latest.json
            data/candidates.csv
          retention-days: 14
