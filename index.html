<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#152b55"><meta name="apple-mobile-web-app-capable" content="yes">
<title>A股波段量化扫描</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#172033;--muted:#748096;--line:#dfe5ef;--blue:#2457e6;--navy:#152b55;--green:#11855a;--red:#c23d46;--amber:#ad6700;--shadow:0 8px 28px rgba(25,45,85,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}button,select{font:inherit}.hidden{display:none!important}
header{position:sticky;top:0;z-index:10;padding:calc(14px + env(safe-area-inset-top)) 17px 14px;background:rgba(21,43,85,.97);color:#fff;backdrop-filter:blur(12px);display:flex;justify-content:space-between;align-items:center}header small{color:#cfe0ff}h1{font-size:22px;margin:3px 0}.headBtns{display:flex;gap:8px}.icon{width:42px;height:42px;border:0;border-radius:13px;background:rgba(255,255,255,.14);color:#fff;font-size:21px}
main{max-width:960px;margin:auto;padding:15px 13px calc(40px + env(safe-area-inset-bottom))}.notice{background:#fff5dc;border:1px solid #f0db92;color:#725100;padding:11px;border-radius:12px;font-size:12px;line-height:1.6;margin-bottom:11px}
.hero{background:linear-gradient(125deg,#17345f,#2457e6);color:white;border-radius:18px;padding:17px;box-shadow:var(--shadow);display:flex;justify-content:space-between;gap:12px}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.16);font-size:11px}.hero h2{margin:9px 0 4px;font-size:20px}.hero p{margin:0;color:#dbe6ff;font-size:11px;line-height:1.55}.breadth{text-align:right}.breadth b{display:block;font-size:28px}.breadth span{font-size:10px;color:#dbe6ff}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:11px 0}.metrics div{background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px 5px;text-align:center}.metrics span{display:block;color:var(--muted);font-size:10px}.metrics b{display:block;font-size:19px;margin-top:4px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}.btn{border:0;border-radius:12px;padding:12px;font-weight:700;text-align:center;text-decoration:none}.primary{background:var(--blue);color:white}.secondary{background:#e8edf6;color:#283650}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:#e5eaf2;padding:5px;border-radius:13px;position:sticky;top:83px;z-index:8}.tab{border:0;background:transparent;padding:9px 3px;border-radius:9px;color:#68748a;font-size:12px;font-weight:750}.tab.active{background:white;color:var(--blue);box-shadow:0 2px 8px rgba(22,44,84,.08)}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}select{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;background:white;color:var(--ink)}.list{display:grid;gap:10px}.empty{background:white;border:1px solid var(--line);border-radius:15px;padding:38px 12px;text-align:center;color:var(--muted);line-height:1.7}
.card{background:white;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 4px 16px rgba(22,44,84,.04)}.top,.priceRow,.levels{display:flex;align-items:center;justify-content:space-between;gap:8px}.name{font-size:17px}.code{font-size:11px;color:var(--muted);margin-left:6px}.sig{font-size:11px;font-weight:800;padding:5px 8px;border-radius:999px}.A{background:#dff5eb;color:var(--green)}.B{background:#e6eeff;color:var(--blue)}.C{background:#fff0d5;color:var(--amber)}
.priceRow{margin:11px 0}.price{font-size:25px;font-weight:850}.change{font-size:12px;margin-left:7px}.up{color:var(--red)}.down{color:var(--green)}.score{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) calc(var(--score)*1%),#e8edf5 0);position:relative}.score:before{content:"";position:absolute;inset:5px;border-radius:50%;background:white}.score b{position:relative;z-index:1;font-size:17px}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.mini div{background:#f6f8fc;border-radius:9px;padding:8px 4px;text-align:center}.mini span{display:block;font-size:9px;color:var(--muted)}.mini b{display:block;font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.levels{border-top:1px solid #edf0f5;margin-top:10px;padding-top:10px;font-size:11px;color:var(--muted)}.levels b{color:var(--ink)}
.sectionTitle{font-size:14px;margin:16px 2px 8px}.industry{display:grid;gap:7px}.industry>div{background:white;border:1px solid var(--line);border-radius:12px;padding:10px}.iTop{display:flex;justify-content:space-between;font-size:12px}.bar{height:6px;background:#e8edf5;border-radius:999px;margin-top:7px;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}
.sheet{position:fixed;inset:0;z-index:30}.back{position:absolute;inset:0;background:rgba(8,18,38,.48)}.sheetCard{position:absolute;left:0;right:0;bottom:0;max-height:88vh;overflow:auto;background:white;border-radius:22px 22px 0 0;padding:17px 17px calc(25px + env(safe-area-inset-bottom))}.close{position:absolute;right:13px;top:12px;border:0;background:#edf1f7;width:34px;height:34px;border-radius:50%;font-size:21px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:12px 0}.grid div{background:#f5f7fb;border-radius:10px;padding:9px;text-align:center}.grid span{display:block;color:var(--muted);font-size:9px}.grid b{display:block;margin-top:4px}.reason{background:#f4f7fd;border-radius:12px;padding:11px;font-size:12px;line-height:1.8}.warn{color:var(--amber);font-size:11px;line-height:1.6}.foot{text-align:center;color:#8994a8;font-size:10px;line-height:1.7;margin-top:20px}
@media(max-width:520px){.metrics{grid-template-columns:repeat(2,1fr)}.mini{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><div><small>A股 1—6 周波段系统</small><h1>全市场量化扫描</h1></div><div class="headBtns"><button class="icon" id="refresh">↻</button></div></header>
<main>
<div id="notice" class="notice">正在读取最新扫描结果…</div>
<section class="hero"><div><span id="mode" class="badge">尚未扫描</span><h2 id="market">市场环境：—</h2><p id="meta">请先在GitHub Actions手动运行扫描</p></div><div class="breadth"><span>市场宽度</span><b id="breadth">—</b></div></section>
<section class="metrics"><div><span>扫描股票</span><b id="universe">0</b></div><div><span>二次启动 A</span><b id="countA">0</b></div><div><span>缩量回踩 B</span><b id="countB">0</b></div><div><span>平台突破 C</span><b id="countC">0</b></div></section>
<section class="actions"><a class="btn primary" href="https://github.com/zhaolaoban8688/a-share-quant-web/actions/workflows/manual_scan.yml" target="_blank">启动手动扫描</a><a class="btn secondary" href="data/candidates.csv" download>下载候选CSV</a></section>
<nav class="tabs"><button class="tab active" data-state="ALL">全部</button><button class="tab" data-state="A">A 二次启动</button><button class="tab" data-state="B">B 回踩</button><button class="tab" data-state="C">C 突破</button></nav>
<div class="filters"><select id="sort"><option value="score">按综合分</option><option value="industry_score">按板块强度</option><option value="r20_pct">按20日涨幅</option><option value="risk_pct">按风险距离</option></select><select id="industry"><option value="">全部行业</option></select></div>
<div id="list" class="list"></div><div id="empty" class="empty hidden">当前分类没有候选。A类优先级最高，B类等待触发，C类只做跟踪。</div>
<h3 class="sectionTitle">强势行业</h3><section id="industries" class="industry"></section>
<p class="foot">零成本验证版使用公开数据接口，偶尔可能限流或字段变化。网页不连接券商、不自动交易。结果仅供研究与复盘，不构成投资建议。</p>
</main>
<div id="sheet" class="sheet hidden"><div class="back" data-close></div><article class="sheetCard"><button class="close" data-close>×</button><div id="detail"></div></article></div>
<script>
let DATA=null,state='ALL';const $=x=>document.getElementById(x);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function n(v,d=2){return Number.isFinite(+v)?(+v).toFixed(d):'—'}function p(v){return Number.isFinite(+v)?n(v,1)+'%':'—'}
async function load(){try{const r=await fetch('data/latest.json?t='+Date.now());if(!r.ok)throw Error('尚无扫描结果');DATA=await r.json();renderAll()}catch(e){$('notice').textContent='尚未生成全市场扫描结果。上传新版文件后，在GitHub Actions运行一次“收盘确认”或“盘中预警”。';$('empty').classList.remove('hidden')}}
function renderAll(){const m=DATA.meta,x=DATA.market,s=DATA.summary;$('mode').textContent=m.mode_name;$('market').textContent='市场环境：'+x.state;$('breadth').textContent=n(x.breadth,1)+'%';$('universe').textContent=m.history_success||m.universe_count;$('countA').textContent=s.A;$('countB').textContent=s.B;$('countC').textContent=s.C;$('meta').textContent=`${m.generated_at.replace('T',' ')}｜${m.data_source}｜耗时 ${m.elapsed_seconds}秒`;$('notice').innerHTML=m.warnings?.length?`<b>扫描成功</b>；${m.warnings.map(esc).join('；')}`:`扫描成功：共选出 ${s.total} 只，优先查看A类二次启动。`;
 const inds=[...new Set(DATA.candidates.map(x=>x.industry).filter(x=>x&&x!='未分类'))].sort();$('industry').innerHTML='<option value="">全部行业</option>'+inds.map(x=>`<option>${esc(x)}</option>`).join('');$('industries').innerHTML=(DATA.industry_ranking||[]).slice(0,12).map(x=>`<div><div class="iTop"><b>${esc(x.name)}</b><span>${p(x.change_pct)}｜强度 ${n(x.score,0)}</span></div><div class="bar"><i style="width:${x.score}%"></i></div></div>`).join('');renderCards()}
function renderCards(){if(!DATA)return;const ind=$('industry').value,sort=$('sort').value;let a=DATA.candidates.filter(x=>(state==='ALL'||x.state===state)&&(!ind||x.industry===ind));a.sort((x,y)=>sort==='risk_pct'?(+x[sort]||99)-(+y[sort]||99):(+y[sort]||0)-(+x[sort]||0));$('empty').classList.toggle('hidden',a.length>0);$('list').innerHTML=a.map((x,i)=>{const ch=+x.change_pct||0;return `<article class="card" data-i="${DATA.candidates.indexOf(x)}"><div class="top"><div><b class="name">${esc(x.name)}</b><span class="code">${x.code}</span></div><span class="sig ${x.state}">${esc(x.signal)}</span></div><div class="priceRow"><div><span class="price">${n(x.price)}</span><span class="change ${ch>=0?'up':'down'}">${p(ch)}</span></div><div class="score" style="--score:${x.score}"><b>${n(x.score,0)}</b></div></div><div class="mini"><div><span>行业</span><b>${esc(x.industry)}</b></div><div><span>回踩量比</span><b>${n(x.pullback_volume_ratio)}</b></div><div><span>距MA20</span><b>${p(x.distance_ma20_pct)}</b></div><div><span>突破后</span><b>${x.days_after_breakout}日</b></div></div><div class="levels"><span>平台 <b>${n(x.platform)}</b></span><span>触发 <b>${n(x.trigger)}</b></span><span>止损 <b>${n(x.stop)}</b></span></div></article>`}).join('');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>detail(DATA.candidates[+c.dataset.i]))}
function detail(x){$('detail').innerHTML=`<h2>${esc(x.name)} <span class="code">${x.code}</span></h2><span class="sig ${x.state}">${esc(x.signal)}</span><div class="grid"><div><span>综合分</span><b>${n(x.score,1)}</b></div><div><span>行业分</span><b>${n(x.industry_score,0)}</b></div><div><span>平台触碰</span><b>${x.platform_touches}次</b></div><div><span>触发价</span><b>${n(x.trigger)}</b></div><div><span>止损价</span><b>${n(x.stop)}</b></div><div><span>2.2R目标</span><b>${n(x.target_2r)}</b></div><div><span>突破量比</span><b>${n(x.breakout_volume_ratio)}</b></div><div><span>回踩量比</span><b>${n(x.pullback_volume_ratio)}</b></div><div><span>风险距离</span><b>${p(x.risk_pct)}</b></div></div><div class="reason">${(x.reason||[]).map(r=>'• '+esc(r)).join('<br>')}</div><p class="warn">${DATA.meta.mode==='intraday'?'盘中预警尚未收盘确认，尾盘回落可能导致信号失效。':'收盘确认仍需结合次日竞价、板块强弱和实际成交条件。'}</p>`;$('sheet').classList.remove('hidden')}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');state=b.dataset.state;renderCards()});$('sort').onchange=$('industry').onchange=renderCards;$('refresh').onclick=load;$('sheet').onclick=e=>{if(e.target.hasAttribute('data-close'))$('sheet').classList.add('hidden')};load();
</script>
</body></html>
